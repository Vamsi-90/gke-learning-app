apiVersion: apps/v1
kind: Deployment
metadata:
  name: gke-learning-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gke-learning-app
  template:
    metadata:
      labels:
        app: gke-learning-app
    spec:
      containers:
      - name: gke-learning-app
        image: us-central1-docker.pkg.dev/gke-learning-2025/gke-repo/gke-learning-app:a32f6286d14f9b16c30c6365a9cb2a5400a5243a
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
